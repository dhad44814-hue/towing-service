kind = "web"
previewPath = "/"
title = "Birmingham Towing & Roadside Assistance"
version = "1.0.0"
id = "artifacts/towing-birmingham"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21156

[services.development]
run = "pnpm --filter @workspace/towing-birmingham run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/towing-birmingham", "run", "build" ]
publicDir = "artifacts/towing-birmingham/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21156"
BASE_PATH = "/"
